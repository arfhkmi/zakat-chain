services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zakatchain-backend
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1
      - OLLAMA_CONTEXT_LENGTH=8192
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zakatchain-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
